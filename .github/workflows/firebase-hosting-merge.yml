# Build and deploy to Firebase Hosting on push to main

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flutter Web
        run: flutter build web --release --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      # Authenticates gcloud + firebase-tools using the service account JSON secret
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AERORIDE_665AF }}

      - name: Deploy to Firebase Hosting
        run: npx -y firebase-tools@latest deploy --only hosting --project aeroride-665af --non-interactive
