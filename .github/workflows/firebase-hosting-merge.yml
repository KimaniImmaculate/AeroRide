# Deploy to Firebase Hosting on push to main

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flutter Web
        run: flutter build web --release --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Write service account to file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AERORIDE_665AF }}' > /tmp/sa.json

      - name: Deploy to Firebase Hosting
        run: |
          output=$(npx -y firebase-tools@latest deploy --only hosting --project aeroride-665af --non-interactive 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            if echo "$output" | grep -q "current active version"; then
              echo "✅ No changes detected — current version is already live. Skipping release."
              exit 0
            else
              echo "❌ Deploy failed with an unexpected error."
              exit 1
            fi
          fi
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json


