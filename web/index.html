<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyANuwPwm1dRFvh_ySIIiW22-dWnUsMrp0k&libraries=geometry&loading=async"></script>  <script src="directions.js"></script>
  <!-- Firebase Cloud Messaging Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .then(function (registration) {
            console.log('[FCM] Service Worker registered with scope:', registration.scope);
          })
          .catch(function (err) {
            console.warn('[FCM] Service Worker registration failed:', err);
          });
      });
    }
  </script>

  <!-- Native Web Recording APIs -->
  <script>
    let mediaRecorder;
    let audioChunks = [];

    window.aerorideStartRecording = async function() {
      console.log("[Aeroride Recorder] Starting audio recording...");
      audioChunks = [];
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = event => {
        if (event.data.size > 0) {
          audioChunks.push(event.data);
        }
      };
      mediaRecorder.start();
    };

    window.aerorideStopRecording = function() {
      console.log("[Aeroride Recorder] Stopping audio recording...");
      return new Promise((resolve, reject) => {
        if (!mediaRecorder) {
          reject("No active media recorder found.");
          return;
        }
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
          const reader = new FileReader();
          reader.onloadend = () => {
            // Stop mic capture tracks to release hardware
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            // result is a data: URL, e.g., "data:audio/wav;base64,UklGRiQAAABXQVZFZm10I..."
            const base64Data = reader.result.split(',')[1];
            console.log("[Aeroride Recorder] Audio captured as Base64.");
            resolve(base64Data);
          };
          reader.readAsDataURL(audioBlob);
        };
        mediaRecorder.stop();
      });
    };

    // Text-to-Speech API
    window.aerorideSpeak = function(text) {
      console.log("[Aeroride TTS] Speaking: ", text);
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // cancel any active speech
        const utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
      } else {
        console.warn("[Aeroride TTS] Speech synthesis is not supported on this browser.");
      }
    };
  </script>
</head>
