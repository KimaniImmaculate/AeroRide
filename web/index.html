<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="aeroride">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>aeroride</title>
  <link rel="manifest" href="manifest.json">

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyANuwPwm1dRFvh_ySIIiW22-dWnUsMrp0k&libraries=geometry&loading=async"></script>  <script src="directions.js"></script>
  <!-- Firebase Cloud Messaging Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .then(function (registration) {
            console.log('[FCM] Service Worker registered with scope:', registration.scope);
          })
          .catch(function (err) {
            console.warn('[FCM] Service Worker registration failed:', err);
          });
      });
    }
  </script>

  <!-- Native Web Recording APIs -->
  <script>
    let mediaRecorder;
    let audioChunks = [];

    window.aerorideStartRecording = async function() {
      console.log("[Aeroride Recorder] Starting audio recording...");
      audioChunks = [];
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = event => {
        if (event.data.size > 0) {
          audioChunks.push(event.data);
        }
      };
      mediaRecorder.start();
    };

    window.aerorideStopRecording = function() {
      console.log("[Aeroride Recorder] Stopping audio recording...");
      return new Promise((resolve, reject) => {
        if (!mediaRecorder) {
          reject("No active media recorder found.");
          return;
        }
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
          const reader = new FileReader();
          reader.onloadend = () => {
            // Stop mic capture tracks to release hardware
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            // result is a data: URL, e.g., "data:audio/wav;base64,UklGRiQAAABXQVZFZm10I..."
            const base64Data = reader.result.split(',')[1];
            console.log("[Aeroride Recorder] Audio captured as Base64.");
            resolve(base64Data);
          };
          reader.readAsDataURL(audioBlob);
        };
        mediaRecorder.stop();
      });
    };

    // Text-to-Speech API
    window.aerorideSpeak = function(text) {
      console.log("[Aeroride TTS] Speaking: ", text);
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // cancel any active speech
        const utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
      }
    };

    // Notification Chime Sound (Ping)
    window.aeroridePlayPing = function() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const playTone = (freq, startTime, duration) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, startTime);
          
          gain.gain.setValueAtTime(0.3, startTime);
          gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
          
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          osc.start(startTime);
          osc.stop(startTime + duration);
        };
        
        const now = ctx.currentTime;
        playTone(880, now, 0.15); // A5 tone
        playTone(1046.5, now + 0.08, 0.25); // C6 tone
      } catch (e) {
        console.error("Failed to play ping sound", e);
      }
    };

    window.aerorideHideRecaptcha = function() {
      const container = document.getElementById('recaptcha-container');
      if (container) {
        container.style.display = 'none';
      }
      // Also hide Google's injected badge element
      document.querySelectorAll('.grecaptcha-badge').forEach(function(el) {
        el.style.visibility = 'hidden';
        el.style.opacity = '0';
      });
    };
  </script>
  <style>
    #recaptcha-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999999;
      background-color: white;
      border-radius: 4px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }
    #recaptcha-container:empty {
      display: none !important;
    }
    .grecaptcha-badge {
      visibility: hidden !important;
    }
  </style>
</head>
<body>
  <div id="recaptcha-container"></div>  

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
