name: aeroride
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  cloud_functions: ^6.3.2
  firebase_storage: 13.4.1
  google_maps_flutter: ^2.17.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  intl: ^0.18.0
  flutter_local_notifications: 9.9.1
  flutter_local_notifications_linux: ^0.5.0
  provider: ^6.1.5+1
  http: ^1.6.0
  flutter_polyline_points: ^3.1.0
  js: ^0.7.1
  google_sign_in: ^7.2.0
  lucide_flutter: ^1.17.0
  lucide_icons_flutter: ^3.1.13
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  firebase_messaging: ^16.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ # This includes all files directly in the assets folder
